<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>
    <div id="text-section">
        <h1 class="upper-text" id="title">Counter</h1>
        <h3 class="upper-text" id="step-declaration">Current Step:</h3>
        <p class="upper-text" id="step-display">1</p>
        <h3 class="upper-text" id="count-declaration">Current Count:</h3>
        <p class="upper-text" id="count-display">0</p>
    </div>
    <div id="interactives-section">
        <button class="btn" id="increment-btn" type="button">Increment</button>
        <button class="btn" id="decrement-btn" type="button">Decrement</button>
        <button class="btn" id="reset-btn" type="reset">Reset</button>
        <div id="step-div">
            <label for="step-input">Enter a step value:</label>
            <input id="step-input" type="number" placeholder="Insert a step value...">
            <button class="btn" id="step-btn" type="button">Step</button>
        </div>
    </div>
</body>
</html>
